steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t',
      'us-central1-docker.pkg.dev/$PROJECT_ID/cicd-labb-repo/cicd-labb:$SHORT_SHA',
      '.'
    ]

  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      'us-central1-docker.pkg.dev/$PROJECT_ID/cicd-labb-repo/cicd-labb:$SHORT_SHA'
    ]

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cicd-labb-repo/cicd-labb:$SHORT_SHA'